kind = "mobile"
previewPath = "/wasal-mobile/"
title = "وصال - تطبيق Android"
version = "1.0.0"
id = "artifacts/wasal-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/wasal-mobile/" ]
localPort = 19216

[services.development]
run = "pnpm --filter @workspace/wasal-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wasal-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/wasal-mobile", "run", "serve" ]

[services.env]
PORT = "19216"
BASE_PATH = "/wasal-mobile/"
