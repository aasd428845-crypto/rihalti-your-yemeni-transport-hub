<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <title>Wasl - منصة النقل الذكية</title>
    <meta name="description" content="أول منصة يمنية متكاملة تربط العملاء بشركات النقل الموثوقة وتوفر خدمات طرود وتوصيل آمنة بين المدن اليمنية" />
    <meta name="author" content="Wasl" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#FFD700" />
    <meta name="theme-color" content="#FFD700" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#FFD700" media="(prefers-color-scheme: dark)" />

    <!-- Mobile Fullscreen (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wasl" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wasl - منصة النقل الذكية" />
    <meta property="og:description" content="أول منصة يمنية متكاملة لخدمات النقل والطرود والتوصيل" />
    <meta property="og:image" content="/opengraph.jpg" />

    <!-- MS Tile (Windows) -->
    <meta name="msapplication-TileColor" content="#FFD700" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://hhqhoqwpebnmfuhwhllw.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Fullscreen safe-area support -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
