[build]
  command = "pnpm --filter @workspace/wasal run build"
  publish = "artifacts/wasal/dist/public"

[context.production]
  command = "pnpm --filter @workspace/wasal run build"
  publish = "artifacts/wasal/dist/public"

[context.main]
  command = "pnpm --filter @workspace/wasal run build"
  publish = "artifacts/wasal/dist/public"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
